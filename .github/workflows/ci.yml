name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Lint + Format + Type check
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check only)
        run: npx prettier --check .

      - name: TypeScript
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Unit tests
  # ──────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Vitest
        run: npm run test

  # ──────────────────────────────────────────────
  # Build (catches runtime import errors, missing deps)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          BASIC_AUTH_ENABLED: "false"

  # ──────────────────────────────────────────────
  # E2E tests (Playwright)
  # ──────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright
        run: npm run test:e2e
        env:
          CI: "true"
          BASIC_AUTH_ENABLED: "false"

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Security: dependency audit
  # ──────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: npm audit (critical + high)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          echo "Checking for potential secrets..."
          # Fail if NEXT_PUBLIC_ vars reference secrets
          if grep -rn "NEXT_PUBLIC_.*\(SECRET\|PASSWORD\|KEY\|TOKEN\|PRIVATE\)" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . ; then
            echo "::error::Found NEXT_PUBLIC_ variable exposing potential secrets"
            exit 1
          fi
          # Fail if hardcoded API keys (common patterns)
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}\|api_key\s*=\s*['\"][^'\"]\{10,\}" --include="*.ts" --include="*.tsx" --include="*.js" . ; then
            echo "::error::Found hardcoded API key"
            exit 1
          fi
          echo "No secrets detected."
